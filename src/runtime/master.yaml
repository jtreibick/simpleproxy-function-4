# Master configuration template
# Source of truth for configuration shape.

proxy_friendly_name: null  # string | null

# Reusable HTTP request registry.
# Request names are keys. Other config sections reference these names.
http_requests:
  jwt_fetch:
    method: GET
    url: "https://example.com/.well-known/jwks.json"
    headers:
      - name: Accept
        value: application/json
      - name: Authorization
        value: "Bearer ${long_auth_key}"
    body_type: none # none | json | urlencoded | raw
    body: null
    http_authorization:
      type: key_rotation # key_rotation only; static auth goes in request headers
      key_rotation:
        store_auth_key_from: data.apiKey
        store_key_ttl_from: data.ttl
        ttl_unit: epoch_seconds # ISO | epoch_seconds | epoch_ms
      # Optional header templates used by key_rotation mode:
      # auth_headers:
      #   - name: Authorization
      #     value: "Bearer ${short_auth_token}"
    security:
      # Omit keys to keep secure runtime defaults.
      # require_https: false
      # block_private_networks: false
      # method_allowlist: [GET]
      # timeout_ms: 5000
      # max_response_bytes: 1048576
      # allowed_hosts: [issuer.example.com]
  outbound_proxy:
    method: POST
    url: "https://api.example.com/token"
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: "Bearer ${long_auth_key}"
    body_type: json
    body:
      client_id: "..."
      client_secret: "..."
      grant_type: client_credentials
    http_authorization:
      type: key_rotation
      key_rotation:
        store_auth_key_from: data.apiKey
        store_key_ttl_from: data.ttl
        ttl_unit: epoch_seconds # ISO | epoch_seconds | epoch_ms
    security: {}
  outbound_proxy_auth_key_rotation:
    method: POST
    url: "https://target.example.com/auth/rotate"
    headers:
      - name: Content-Type
        value: application/json
    body_type: json
    body: {}
  emit_logs:
    method: POST
    url: "https://logs.example.com/ingest"
    headers:
      - name: Content-Type
        value: application/json
      - name: Authorization
        value: "Bearer ${long_auth_key}"
    body_type: json
    body: {}
    http_authorization:
      type: key_rotation
      key_rotation:
        store_auth_key_from: data.apiKey
        store_key_ttl_from: data.ttl
        ttl_unit: epoch_seconds # ISO | epoch_seconds | epoch_ms
    security: {}
  emit_logs_key_rotation:
    method: POST
    url: "https://logs.example.com/auth/rotate"
    headers:
      - name: Content-Type
        value: application/json
    body_type: json
    body: {}

jwt:
  enabled: false
  mode: null #issue_tokens | verify_external_tokens
  verify_external_tokens:
    clock_skew_seconds: 0
    # external validation endpoints configured in http_requests
  issue_tokens:
    enabled: false
    header: Authorization
    scheme: Bearer
    issuer: null
    audience: null
    subject: null
    ttl_seconds: 3600 # positive integer

proxy_access_control:
  proxy_key:
    expiry_in_seconds: null # positive integer | null
  jwt_issuer_key:
    expiry_in_seconds: null # positive integer | null
  admin_key:
    expiry_in_seconds: null # positive integer | null

logging:
  max_logging_session_seconds: 3600 # 1..604800

targetCredentialRotation:
  response:
    ttl_path: data.ttl
    expires_at_path: null


transform:
  enabled: true
  source_request:
    enabled: false
    custom_js_preprocessor: null
    header_filtering:
      mode: blacklist # blacklist | whitelist
      names:
        - connection
        - keep-alive
        - proxy-authenticate
        - proxy-authorizationi
        - trailer
        - transfer-encoding
        - upgrade
        - host
        - content-length
        - x-proxy-key
        - x-admin-key
        - x-issuer-key
    rules: []
    # - name: source_request_rule
    #   match_method: [GET, POST]
    #   match_path: ["/v1/*"]
    #   match_headers:
    #     - name: x-api-mode
    #       value: legacy
    #   expr: |
    #     { "upstream": upstream }
  target_response:
    enabled: true
    custom_js_preprocessor: null
    header_filtering:
      mode: blacklist # blacklist | whitelist
      names:
        - x-proxy-key
        - x-admin-key
        - x-issuer-key
        - set-cookie
        - proxy-authenticate
    rules: []
    # - name: target_response_errors
    #   match_status: [4xx, 5xx, 422]
    #   match_type: json # json | text | binary | any
    #   match_headers:
    #     - name: x-api-mode
    #       value: legacy
    #   expr: |
    #     { "ok": false, "status": status, "error": body }
